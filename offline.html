<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a0a0a">
    <title>Нет подключения</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0a0a 0%, #2d1414 100%);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }

        .container {
            text-align: center;
            max-width: 400px;
        }

        .icon {
            font-size: 80px;
            margin-bottom: 24px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #ffffff, #ffb3b3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .description {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            margin-bottom: 28px;
        }

        .status {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 20px;
            background: rgba(255, 100, 100, 0.1);
            border: 1px solid rgba(255, 100, 100, 0.25);
            color: #ff9a9a;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .suggestions {
            text-align: left;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 100, 100, 0.15);
            border-radius: 20px;
            padding: 20px;
            font-size: 14px;
            line-height: 1.8;
        }

        .suggestions li {
            list-style: none;
            padding: 8px 0;
            padding-left: 24px;
            position: relative;
        }

        .suggestions li::before {
            content: '→';
            position: absolute;
            left: 0;
            color: #ff9a9a;
            font-weight: bold;
        }

        .retry-btn {
            display: inline-block;
            margin-top: 28px;
            padding: 16px 32px;
            border-radius: 22px;
            border: 1px solid rgba(255, 100, 100, 0.25);
            background: rgba(255, 100, 100, 0.1);
            color: #ff9a9a;
            font-family: inherit;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .retry-btn:hover {
            background: rgba(255, 100, 100, 0.2);
            border-color: rgba(255, 100, 100, 0.4);
            transform: translateY(-2px);
        }

        .retry-btn:active {
            transform: translateY(0);
        }

        .footer {
            margin-top: 32px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <span class="icon">📡</span>
        <h1>Нет подключения</h1>
        <p class="description">Приложение работает в офлайн-режиме</p>
        <div class="status">Ожидаем интернета...</div>

        <div class="suggestions">
            <ul>
                <li>Проверьте подключение Wi-Fi или Мобильные данные</li>
                <li>Отключите Авиарежим</li>
                <li>Перезагрузите устройство</li>
                <li>Попробуйте позже</li>
            </ul>
        </div>

        <button class="retry-btn" onclick="location.reload()">
            ↻ Попробовать снова
        </button>

        <div class="footer">
            <p>ЕГЭ 2026 v4.0 · Offline Mode</p>
            <p style="margin-top: 8px;">Данные сохранены локально на устройстве</p>
        </div>
    </div>

    <script>
        // Проверяем подключение и автоматически перезагружаемся
        window.addEventListener('online', () => {
            console.log('Соединение восстановлено!');
            setTimeout(() => {
                location.reload();
            }, 1000);
        });

        // Логируем статус подключения
        console.log('Статус онлайн:', navigator.onLine);
    </script>
</body>
</html>
