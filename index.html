<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Ссылка на манифест -->
    <link rel="manifest" href="./manifest.json">

    <!-- Настройки для iOS (iPhone), чтобы выглядело как приложение -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ЕГЭ 2026">
    <link rel="apple-touch-icon" href="./icons/icon-192x192.png">

    <!-- Цвет вкладки браузера под твой дизайн -->
    <meta name="theme-color" content="#1a0a0a">
    <script src="./theme.js"></script>

    <title>Цели на ЕГЭ</title>
    <style>
        :root {
            --page-bg: #1a0a0a;
            --surface: rgba(255, 255, 255, 0.05);
            --surface-strong: rgba(255, 255, 255, 0.1);
            --accent-primary: #ff4d4d;
            --accent-secondary: #ff8080;
            --accent-tertiary: #e63946;
            --accent-text: #ff9a9a;
            --accent-text-alt: #ffb3b3;
            --accent-soft: rgba(255, 100, 100, 0.1);
            --accent-border: rgba(255, 100, 100, 0.25);
            --accent-border-strong: rgba(255, 100, 100, 0.5);
            --accent-shadow: rgba(255, 77, 77, 0.25);
            --accent-dot: #ff4d4d;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            background: var(--page-bg);
            overflow: hidden;
        }

        /* Animated background */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .bg span {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.5;
            animation: float 8s ease-in-out infinite;
        }

        .bg span:nth-child(1) {
            width: 500px; height: 500px;
            background: var(--accent-primary);
            top: -10%; left: -5%;
            animation-delay: 0s;
        }

        .bg span:nth-child(2) {
            width: 400px; height: 400px;
            background: var(--accent-secondary);
            bottom: -10%; right: -5%;
            animation-delay: -3s;
        }

        .bg span:nth-child(3) {
            width: 350px; height: 350px;
            background: var(--accent-tertiary);
            top: 40%; left: 50%;
            transform: translateX(-50%);
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-40px) scale(1.08); }
        }

        /* Login button - top right corner */
        .settings-btn {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 100;
            width: 50px;
            height: 50px;
            border-radius: 18px;
            border: 1px solid var(--accent-border);
            background: rgba(255, 255, 255, 0.08);
            display: grid;
            place-items: center;
            color: var(--accent-text);
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .settings-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--accent-border-strong);
            box-shadow: 0 8px 32px var(--accent-shadow);
        }

        .settings-btn svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
        }

        .theme-panel {
            position: fixed;
            top: 90px;
            right: 30px;
            z-index: 110;
            width: 220px;
            padding: 18px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--accent-border);
            backdrop-filter: blur(24px);
            opacity: 0;
            transform: translateY(-12px);
            pointer-events: none;
            transition: all 0.2s ease;
        }

        .theme-panel.open {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .theme-panel .panel-title {
            margin-bottom: 14px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent-text);
        }

        .theme-options {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }

        .theme-swatch {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 14px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .theme-swatch:hover {
            transform: translateY(-2px);
            border-color: var(--accent-border);
        }

        .theme-swatch.active {
            border-color: #fff;
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.12);
        }

        /* Card */
        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--accent-border);
            border-radius: 32px;
            padding: 50px 60px 60px;
            text-align: center;
            box-shadow:
                0 0 80px rgba(255, 77, 77, 0.1),
                inset 0 0 80px rgba(255, 100, 100, 0.03);
        }

        .title {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent-text);
            margin-bottom: 10px;
        }

        .heading {
            font-size: 38px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 50px;
            background: linear-gradient(135deg, #ffffff, var(--accent-text-alt));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Circles container */
        .circles {
            display: flex;
            gap: 60px;
            align-items: flex-end;
            justify-content: center;
        }

        .circle-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards;
        }

        .circle-item:nth-child(1) { animation-delay: 0.2s; }
        .circle-item:nth-child(2) { animation-delay: 0.4s; }
        .circle-item:nth-child(3) { animation-delay: 0.6s; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* SVG Circle */
        .progress-ring {
            width: 160px;
            height: 160px;
            transform: rotate(-90deg);
        }

        .progress-ring__bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.07);
            stroke-width: 8;
        }

        .progress-ring__fill {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 408.4;
            stroke-dashoffset: 408.4;
            animation: fillRing 2s ease forwards;
        }

        .circle-item:nth-child(1) .progress-ring__fill {
            stroke: url(#grad1);
            animation-delay: 0.5s;
        }

        .circle-item:nth-child(2) .progress-ring__fill {
            stroke: url(#grad2);
            animation-delay: 0.7s;
        }

        .circle-item:nth-child(3) .progress-ring__fill {
            stroke: url(#grad3);
            animation-delay: 0.9s;
        }

        @keyframes fillRing {
            to {
                stroke-dashoffset: var(--offset);
            }
        }

        /* Score inside circle */
        .score-wrapper {
            position: relative;
            display: inline-block;
        }

        .score {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            font-weight: 800;
            color: #fff;
            line-height: 1;
        }

        .score small {
            font-size: 16px;
            font-weight: 600;
            color: rgba(255, 180, 180, 0.6);
        }

        /* Subject label */
        .subject {
            font-size: 15px;
            font-weight: 600;
            color: #ffaaaa;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* Glow dots */
        .glow-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-top: 8px;
            animation: pulse 2s ease-in-out infinite;
            background: var(--accent-dot);
            box-shadow: 0 0 12px var(--accent-shadow);
        }

        .circle-item:nth-child(1) .glow-dot { animation-delay: 0s; }
        .circle-item:nth-child(2) .glow-dot { animation-delay: 0.3s; }
        .circle-item:nth-child(3) .glow-dot { animation-delay: 0.6s; }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }

        /* Divider */
        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-border), transparent);
            margin: 30px auto 0;
            border-radius: 2px;
        }

        .subtitle {
            margin-top: 16px;
            font-size: 13px;
            color: rgba(255, 150, 150, 0.35);
            letter-spacing: 2px;
        }

        @media (max-width: 700px) {
            .settings-btn {
                top: 20px;
                right: 20px;
                width: 44px;
                height: 44px;
            }
            .settings-btn svg {
                width: 16px;
                height: 16px;
            }
            .card { padding: 40px 30px 50px; margin: 20px; }
            .circles { gap: 30px; }
            .progress-ring { width: 120px; height: 120px; }
            .score { font-size: 28px; }
            .heading { font-size: 28px; }
        }
    </style>
</head>
<body>

    <div class="bg">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <button class="settings-btn" id="settingsBtn" type="button" aria-label="Настройки темы">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" />
            <path d="M19.4 15a7.07 7.07 0 0 0 .1-1 7.07 7.07 0 0 0-.1-1l2.1-1.6a0.5 0.5 0 0 0 .1-0.7l-2-3.4a0.5 0.5 0 0 0-.6-0.2l-2.5 1a7.2 7.2 0 0 0-1.8-1l-0.4-2.7A0.5 0.5 0 0 0 14.7 4h-4a0.5 0.5 0 0 0-0.5 0.4l-0.4 2.7a7.2 7.2 0 0 0-1.8 1l-2.5-1a0.5 0.5 0 0 0-0.6 0.2l-2 3.4a0.5 0.5 0 0 0 .1 0.7l2.1 1.6a7.07 7.07 0 0 0-.1 1 7.07 7.07 0 0 0 .1 1L2.6 16.6a0.5 0.5 0 0 0-.1 0.7l2 3.4a0.5 0.5 0 0 0 .6 0.2l2.5-1a7.2 7.2 0 0 0 1.8 1l0.4 2.7a0.5 0.5 0 0 0 .5 0.4h4a0.5 0.5 0 0 0 .5-0.4l0.4-2.7a7.2 7.2 0 0 0 1.8-1l2.5 1a0.5 0.5 0 0 0 .6-0.2l2-3.4a0.5 0.5 0 0 0-.1-0.7l-2.1-1.6Z" />
        </svg>
    </button>

    <div class="theme-panel" id="themePanel">
        <div class="panel-title">Выбери цвет</div>
        <div class="theme-options">
            <button class="theme-swatch" data-theme="red" style="background: #ff4d4d" aria-label="Красный"></button>
            <button class="theme-swatch" data-theme="blue" style="background: #4d8cff" aria-label="Голубой"></button>
            <button class="theme-swatch" data-theme="green" style="background: #33c37d" aria-label="Зеленый"></button>
            <button class="theme-swatch" data-theme="yellow" style="background: #ffd34d" aria-label="Желтый"></button>
            <button class="theme-swatch" data-theme="pink" style="background: #ff4dbd" aria-label="Ярко розовый"></button>
            <button class="theme-swatch" data-theme="gray" style="background: #ababab" aria-label="Серый"></button>
        </div>
    </div>

    <div class="card">
        <div class="title">Цели на</div>
        <h1 class="heading">ЕГЭ 2026</h1>

        <div class="circles">

            <!-- Русский — 81 -->
            <a href="russian.html" class="circle-item" style="text-decoration: none; color: inherit;">
                <div class="score-wrapper">
                    <svg class="progress-ring" viewBox="0 0 140 140">
                        <defs>
                            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="var(--accent-primary)"/>
                                <stop offset="100%" stop-color="var(--accent-secondary)"/>
                            </linearGradient>
                        </defs>
                        <circle class="progress-ring__bg" cx="70" cy="70" r="65"/>
                        <circle class="progress-ring__fill" cx="70" cy="70" r="65"
                            style="--offset: 77.6;"/>
                    </svg>
                    <div class="score">81</div>
                </div>
                <div class="subject">Русский язык</div>
                <div class="glow-dot"></div>
            </a>

            <!-- Математика — 82 -->
            <a href="math.html" class="circle-item" style="text-decoration: none; color: inherit;">
                <div class="score-wrapper">
                    <svg class="progress-ring" viewBox="0 0 140 140">
                        <defs>
                            <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="var(--accent-primary)"/>
                                <stop offset="100%" stop-color="var(--accent-secondary)"/>
                            </linearGradient>
                        </defs>
                        <circle class="progress-ring__bg" cx="70" cy="70" r="65"/>
                        <circle class="progress-ring__fill" cx="70" cy="70" r="65"
                            style="--offset: 73.5;"/>
                    </svg>
                    <div class="score">82</div>
                </div>
                <div class="subject">Математика</div>
                <div class="glow-dot"></div>
            </a>

            <!-- Информатика — 93 -->
            <a href="informatics.html" class="circle-item" style="text-decoration: none; color: inherit;">
                <div class="score-wrapper">
                    <svg class="progress-ring" viewBox="0 0 140 140">
                        <defs>
                            <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="var(--accent-primary)"/>
                                <stop offset="100%" stop-color="var(--accent-secondary)"/>
                            </linearGradient>
                        </defs>
                        <circle class="progress-ring__bg" cx="70" cy="70" r="65"/>
                        <circle class="progress-ring__fill" cx="70" cy="70" r="65"
                            style="--offset: 28.6;"/>
                    </svg>
                    <div class="score">93</div>
                </div>
                <div class="subject">Информатика</div>
                <div class="glow-dot"></div>
            </a>

        </div>

        <div class="divider"></div>
        <div class="subtitle">Дорогу осилит идущий.</div>
    </div>

    <script>
      // Регистрация Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('Service Worker зарегистрирован'))
            .catch(err => console.log('Ошибка:', err));
        });
      }
    </script>

</body>
</html>
