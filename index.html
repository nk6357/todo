<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <!-- Ссылка на манифест -->
    <link rel="manifest" href="./manifest.json">

    <!-- Настройки для iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ЕГЭ 2026">
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/android-chrome-192x192.png">

    <!-- Цвет вкладки -->
    <meta name="theme-color" content="#1a0a0a">
    <script src="./theme.js"></script>

    <!-- Шрифт для PDF (UTF-8) -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">

    <title>Цели на ЕГЭ</title>
    <style>
        :root {
            --page-bg: #1a0a0a;
            --surface: rgba(255, 255, 255, 0.05);
            --surface-strong: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.55);
            --accent-primary: #ff4d4d;
            --accent-secondary: #ff8080;
            --accent-tertiary: #e63946;
            --accent-text: #ff9a9a;
            --accent-text-alt: #ffb3b3;
            --accent-soft: rgba(255, 100, 100, 0.1);
            --accent-border: rgba(255, 100, 100, 0.25);
            --accent-border-strong: rgba(255, 100, 100, 0.5);
            --accent-shadow: rgba(255, 77, 77, 0.25);
            --accent-dot: #ff4d4d;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            touch-action: manipulation;
        }

        html {
            min-height: 100%;
            background: var(--page-bg);
            color: var(--text-primary);
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            background: var(--page-bg);
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-text-size-adjust: 100%;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* Animated background */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .bg span {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.5;
            animation: float 8s ease-in-out infinite;
        }

        .bg span:nth-child(1) {
            width: 500px; height: 500px;
            background: var(--accent-primary);
            top: -10%; left: -5%;
            animation-delay: 0s;
        }

        .bg span:nth-child(2) {
            width: 400px; height: 400px;
            background: var(--accent-secondary);
            bottom: -10%; right: -5%;
            animation-delay: -3s;
        }

        .bg span:nth-child(3) {
            width: 350px; height: 350px;
            background: var(--accent-tertiary);
            top: 40%; left: 50%;
            transform: translateX(-50%);
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-40px) scale(1.08); }
        }

        /* Settings button */
        .settings-btn {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 100;
            width: 50px;
            height: 50px;
            border-radius: 18px;
            border: 1px solid var(--accent-border);
            background: var(--surface);
            display: grid;
            place-items: center;
            color: var(--accent-text);
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .settings-btn:hover {
            background: var(--surface-strong);
            border-color: var(--accent-border-strong);
            box-shadow: 0 8px 32px var(--accent-shadow);
        }

        .settings-btn svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
        }

        .theme-panel {
            position: fixed;
            top: 90px;
            right: 30px;
            z-index: 110;
            width: 220px;
            padding: 18px;
            border-radius: 24px;
            background: var(--surface);
            border: 1px solid var(--accent-border);
            backdrop-filter: blur(24px);
            opacity: 0;
            transform: translateY(-12px);
            pointer-events: none;
            transition: all 0.2s ease;
        }

        .theme-panel.open {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .theme-panel .panel-title {
            margin-bottom: 14px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent-text);
        }

        .theme-options {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }

        .theme-swatch {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 14px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .theme-swatch:hover {
            transform: translateY(-2px);
            border-color: var(--accent-border);
        }

        .theme-swatch.active {
            border-color: var(--accent-text-alt);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.12);
        }

        /* Card */
        .card {
            position: relative;
            z-index: 1;
            width: min(92vw, 720px);
            max-width: 720px;
            background: var(--surface);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--accent-border);
            border-radius: 32px;
            padding: clamp(32px, 5vw, 56px) clamp(24px, 6vw, 60px) clamp(32px, 5vw, 56px);
            text-align: center;
            box-shadow:
                0 0 80px rgba(0, 0, 0, 0.14),
                inset 0 0 80px rgba(255, 255, 255, 0.03);
        }

        .title {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent-text);
            margin-bottom: 10px;
        }

        .heading {
            font-size: 38px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 50px;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-text-alt));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Circles */
        .circles {
            display: flex;
            flex-wrap: wrap;
            gap: 32px;
            align-items: flex-end;
            justify-content: center;
        }

        .circle-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            min-width: 145px;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .circle-item:nth-child(1) { animation-delay: 0.2s; }
        .circle-item:nth-child(2) { animation-delay: 0.4s; }
        .circle-item:nth-child(3) { animation-delay: 0.6s; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* SVG Circle */
        .progress-ring {
            width: 160px;
            height: 160px;
            transform: rotate(-90deg);
        }

        .progress-ring__bg {
            fill: none;
            stroke: var(--surface-strong);
            stroke-width: 8;
        }

        .progress-ring__fill {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 408.4;
            stroke-dashoffset: 408.4;
            animation: fillRing 2s ease forwards;
        }

        .circle-item:nth-child(1) .progress-ring__fill {
            stroke: url(#grad1);
            animation-delay: 0.5s;
        }

        .circle-item:nth-child(2) .progress-ring__fill {
            stroke: url(#grad2);
            animation-delay: 0.7s;
        }

        .circle-item:nth-child(3) .progress-ring__fill {
            stroke: url(#grad3);
            animation-delay: 0.9s;
        }

        @keyframes fillRing {
            to {
                stroke-dashoffset: var(--offset);
            }
        }

        /* Score */
        .score-wrapper {
            position: relative;
            display: inline-block;
        }

        .score {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1;
        }

        .score small {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-muted);
        }

        /* Subject */
        .subject {
            font-size: 15px;
            font-weight: 600;
            color: var(--accent-text);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* Glow dots */
        .glow-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-top: 8px;
            animation: pulse 2s ease-in-out infinite;
            background: var(--accent-dot);
            box-shadow: 0 0 12px var(--accent-shadow);
        }

        .circle-item:nth-child(1) .glow-dot { animation-delay: 0s; }
        .circle-item:nth-child(2) .glow-dot { animation-delay: 0.3s; }
        .circle-item:nth-child(3) .glow-dot { animation-delay: 0.6s; }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }

        /* Divider */
        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-border), transparent);
            margin: 30px auto 0;
            border-radius: 2px;
        }

        .subtitle {
            margin-top: 16px;
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 2px;
        }

        /* Motivation Block */
        .motivation-block {
            position: relative;
            z-index: 1;
            width: min(92vw, 720px);
            max-width: 720px;
            margin: 38px auto 0;
            background: var(--surface);
            border: 1px solid var(--accent-border);
            border-radius: 32px;
            padding: clamp(28px, 4vw, 40px) clamp(20px, 5vw, 36px);
            text-align: center;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.08);
            animation: fadeUp 0.8s ease forwards;
            animation-delay: 0.3s;
            opacity: 1;
        }

        .motivation-block .title {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--accent-text);
            margin-bottom: 18px;
        }

        .motivation-content {
            min-height: auto;
            display: block;
            margin: 0 auto 24px;
            padding: 0 8px;
        }

        .motivation-text {
            display: inline-block;
            max-width: 100%;
            font-size: clamp(18px, 4vw, 22px);
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.5;
            letter-spacing: 0.1em;
            white-space: normal;
            word-break: break-word;
            opacity: 1;
            transition: opacity 0.2s ease;
            text-align: center;
        }

        .motivation-text.animate {
            animation: fadeIn 0.4s ease forwards;
        }

        .motivation-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 32px;
            min-width: 250px;
            border-radius: 20px;
            border: 1px solid var(--accent-border);
            background: var(--surface);
            color: var(--accent-text);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .motivation-btn:hover {
            background: var(--surface-strong);
            border-color: var(--accent-border-strong);
            transform: translateY(-2px);
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.12);
        }

        .motivation-btn:active {
            transform: translateY(0);
        }

        .motivation-btn svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
        }

        .analytics-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 28px auto 0;
            width: min(100%, 320px);
            padding: 16px 28px;
            border-radius: 24px;
            border: 1px solid var(--accent-border);
            background: var(--surface);
            color: var(--accent-text);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s ease;
            position: relative;
            z-index: 50;
        }

        .analytics-link:hover {
            background: var(--surface-strong);
            border-color: var(--accent-border-strong);
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.12);
            transform: translateY(-1px);
        }

        /* Кнопка "Добавить задачу" — стиль для PDF-кнопки */
        .add-task-btn, .download-pdf-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 24px;
            width: 100%;
            border-radius: 24px;
            border: 2px dashed var(--accent-border);
            background: transparent;
            color: var(--accent-text);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .add-task-btn:hover, .download-pdf-btn:hover {
            border-color: var(--accent-text-alt);
            color: var(--accent-text-alt);
            transform: translateY(-1px);
        }

        .add-task-btn svg, .download-pdf-btn svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 2;
        }

        @media (max-width: 700px) {
            .settings-btn {
                top: 20px;
                right: 20px;
                width: 44px;
                height: 44px;
            }
            .settings-btn svg {
                width: 16px;
                height: 16px;
            }
            .card { padding: 40px 30px 50px; margin: 20px; }
            .circles { gap: 30px; }
            .progress-ring { width: 120px; height: 120px; }
            .score { font-size: 28px; }
            .heading { font-size: 28px; }
            .motivation-block {
                padding: 28px 20px;
                margin-top: 28px;
            }
            .motivation-content {
                margin-bottom: 20px;
            }
            .motivation-btn {
                width: 100%;
                min-width: auto;
                padding: 16px 24px;
            }
            .motivation-text {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <div class="bg">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <button class="settings-btn" id="settingsBtn" type="button" aria-label="Настройки темы">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" />
            <path d="M19.4 15a7.07 7.07 0 0 0 .1-1 7.07 7.07 0 0 0-.1-1l2.1-1.6a0.5 0.5 0 0 0 .1-0.7l-2-3.4a0.5 0.5 0 0 0-.6-0.2l-2.5 1a7.2 7.2 0 0 0-1.8-1l-0.4-2.7A0.5 0.5 0 0 0 14.7 4h-4a0.5 0.5 0 0 0-0.5 0.4l-0.4 2.7a7.2 7.2 0 0 0-1.8 1l-2.5-1a0.5 0.5 0 0 0-0.6 0.2l-2 3.4a0.5 0.5 0 0 0 .1 0.7l2.1 1.6a7.07 7.07 0 0 0-.1 1 7.07 7.07 0 0 0 .1 1L2.6 16.6a0.5 0.5 0 0 0-.1 0.7l2 3.4a0.5 0.5 0 0 0 .6 0.2l2.5-1a7.2 7.2 0 0 0 1.8 1l0.4 2.7a0.5 0.5 0 0 0 .5 0.4h4a0.5 0.5 0 0 0 .5-0.4l0.4-2.7a7.2 7.2 0 0 0 1.8-1l2.5 1a0.5 0.5 0 0 0 .6-0.2l2-3.4a0.5 0.5 0 0 0-.1-0.7l-2.1-1.6Z" />
        </svg>
    </button>

    <div class="theme-panel" id="themePanel">
        <div class="panel-title">Выбери цвет</div>
        <div class="theme-options">
            <button class="theme-swatch" data-theme="red" style="background: #ff4d4d" aria-label="Красный"></button>
            <button class="theme-swatch" data-theme="blue" style="background: #4d8cff" aria-label="Голубой"></button>
            <button class="theme-swatch" data-theme="green" style="background: #33c37d" aria-label="Зеленый"></button>
            <button class="theme-swatch" data-theme="yellow" style="background: #ffd34d" aria-label="Желтый"></button>
            <button class="theme-swatch" data-theme="pink" style="background: #ff4dbd" aria-label="Ярко розовый"></button>
            <button class="theme-swatch" data-theme="gray" style="background: #ababab" aria-label="Серый"></button>
        </div>
    </div>

    <div class="page-content">
        <div class="card">
            <div class="title">Цели на</div>
            <h1 class="heading">ЕГЭ 2026</h1>

        <div class="circles">

            <!-- Русский -->
            <a href="russian.html" class="circle-item" style="text-decoration: none; color: inherit;">
                <div class="score-wrapper">
                    <svg class="progress-ring" viewBox="0 0 140 140">
                        <defs>
                            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="var(--accent-primary)"/>
                                <stop offset="100%" stop-color="var(--accent-secondary)"/>
                            </linearGradient>
                        </defs>
                        <circle class="progress-ring__bg" cx="70" cy="70" r="65"/>
                        <circle class="progress-ring__fill" cx="70" cy="70" r="65" style="--offset: 77.6;"/>
                    </svg>
                    <div class="score">81</div>
                </div>
                <div class="subject">Русский язык</div>
                <div class="glow-dot"></div>
            </a>

            <!-- Математика -->
            <a href="math.html" class="circle-item" style="text-decoration: none; color: inherit;">
                <div class="score-wrapper">
                    <svg class="progress-ring" viewBox="0 0 140 140">
                        <defs>
                            <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="var(--accent-primary)"/>
                                <stop offset="100%" stop-color="var(--accent-secondary)"/>
                            </linearGradient>
                        </defs>
                        <circle class="progress-ring__bg" cx="70" cy="70" r="65"/>
                        <circle class="progress-ring__fill" cx="70" cy="70" r="65" style="--offset: 73.5;"/>
                    </svg>
                    <div class="score">82</div>
                </div>
                <div class="subject">Математика</div>
                <div class="glow-dot"></div>
            </a>

            <!-- Информатика -->
            <a href="informatics.html" class="circle-item" style="text-decoration: none; color: inherit;">
                <div class="score-wrapper">
                    <svg class="progress-ring" viewBox="0 0 140 140">
                        <defs>
                            <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="var(--accent-primary)"/>
                                <stop offset="100%" stop-color="var(--accent-secondary)"/>
                            </linearGradient>
                        </defs>
                        <circle class="progress-ring__bg" cx="70" cy="70" r="65"/>
                        <circle class="progress-ring__fill" cx="70" cy="70" r="65" style="--offset: 28.6;"/>
                    </svg>
                    <div class="score">93</div>
                </div>
                <div class="subject">Информатика</div>
                <div class="glow-dot"></div>
            </a>

        </div>

        <div class="divider"></div>
        <div class="subtitle">Дорогу осилит идущий.</div>
    </div>

    <!-- Motivation Block -->
    <div class="motivation-block">
        <div class="title">Мотивация</div>
        <div class="motivation-content">
            <div class="motivation-text" id="motivationText">Как насчет мотивации?)</div>
        </div>
        <button class="motivation-btn" id="motivationBtn" type="button" aria-label="Получить мотивацию">
            <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
            </svg>
            Получить
        </button>
    </div>
    <a href="./analytics.html" class="analytics-link">Аналитика</a>
    <button id="printBtn" class="add-task-btn" style="margin-top: 16px;">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        Печать
    </button>

    <!-- Модальное окно для печати -->
    <div id="printModal" class="modal-overlay" style="display:none; position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,0.7); backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; padding:20px;">
        <div class="modal-content" style="width:100%; max-width:600px; background:var(--surface); border-radius:28px; border:1px solid var(--accent-border); padding:32px; box-shadow:0 24px 80px rgba(0,0,0,0.3); backdrop-filter:blur(40px);">
            <h2 style="color:var(--text-primary); font-size:20px; font-weight:800; margin-bottom:24px; text-align:center;">PDF-отчет готов</h2>
            <p style="color:var(--text-muted); font-size:14px; margin-bottom:24px; text-align:center;">Файл будет сформирован с белым фоном и черным текстом.</p>
            <button id="downloadPdfBtn" class="download-pdf-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                </svg>
                Скачать PDF
            </button>
            <button id="closePrintModal" class="add-task-btn" style="margin-top:12px; border-color:var(--accent-border); color:var(--accent-text); background:transparent;">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"/>
                    <line x1="6" y1="6" x2="18" y2="18"/>
                </svg>
                Отмена
            </button>
        </div>
    </div>

    <script>
      // Регистрация Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('Service Worker зарегистрирован'))
            .catch(err => console.log('Ошибка:', err));
        });
      }

      // Motivation block
      let motivations = [];
      let currentMotivationIndex = -1;

      async function loadMotivations() {
        const paths = ['./словарь.txt', 'словарь.txt'];
        for (const path of paths) {
          try {
            const response = await fetch(path);
            if (!response.ok) continue;
            const text = await response.text();
            motivations = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
            if (motivations.length) return;
          } catch (_) {}
        }
        motivations = [
          'Ты справишься! Верь в себя!',
          'Каждый день — это новая возможность.',
          'Не сдавайся, ты почти там!',
          'Успех ждёт тех, кто готов трудиться.'
        ];
      }

      function getRandomMotivation() {
        if (motivations.length === 0) return 'Как насчет мотивации?)';
        let randomIndex;
        do {
          randomIndex = Math.floor(Math.random() * motivations.length);
        } while (randomIndex === currentMotivationIndex && motivations.length > 1);
        currentMotivationIndex = randomIndex;
        return motivations[randomIndex];
      }

      function displayMotivation() {
        const el = document.getElementById('motivationText');
        const newTxt = getRandomMotivation();
        el.classList.remove('animate');
        el.style.opacity = '0';
        setTimeout(() => {
          el.textContent = newTxt;
          el.style.opacity = '1';
          el.classList.add('animate');
        }, 50);
      }

      document.addEventListener('DOMContentLoaded', async () => {
        await loadMotivations();
        document.getElementById('motivationBtn')?.addEventListener('click', displayMotivation);
      });

      // Кнопка "Печать"
      document.getElementById('printBtn')?.addEventListener('click', () => {
        document.getElementById('printModal').style.display = 'flex';
      });

      document.getElementById('closePrintModal')?.addEventListener('click', () => {
        document.getElementById('printModal').style.display = 'none';
      });

      document.getElementById('downloadPdfBtn')?.addEventListener('click', async () => {
        // Загружаем jsPDF
        const script = document.createElement('script');
        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
        document.head.appendChild(script);

        script.onload = async () => {
          await new Promise(r => setTimeout(r, 300));
          const { jsPDF } = window.jspdf;

          // Создаём PDF с поддержкой кириллицы
          const pdf = new jsPDF({
            orientation: 'p',
            unit: 'mm',
            format: 'a4'
          });

          // Регистрируем шрифт Noto Sans (UTF-8)
          const fontUrl = 'https://cdn.jsdelivr.net/npm/noto-sans@12.0.0/files/NotoSans-Regular.ttf';
          const fontData = await fetch(fontUrl).then(res => res.arrayBuffer());
          const fontName = 'NotoSans';
          pdf.addFileToVFS(fontName + '.ttf', fontData);
          pdf.addFont(fontName + '.ttf', fontName, 'normal');
          pdf.setFont(fontName);

          // Заголовок
          pdf.setFontSize(22);
          pdf.setTextColor(0, 0, 0);
          pdf.text('ToDo ЕГЭ', pdf.internal.pageSize.getWidth() / 2, 20, { align: 'center' });

          let yPos = 40;

          // Предметы и задачи
          const subjects = ['math', 'russian', 'informatics'];
          const titles = ['Математика', 'Русский язык', 'Информатика'];

          for (let i = 0; i < subjects.length; i++) {
            const key = `${subjects[i]}_tasks`;
            const tasks = JSON.parse(localStorage.getItem(key) || '[]');

            if (tasks.length > 0) {
              // Заголовок предмета
              pdf.setFontSize(16);
              pdf.setFont(fontName, 'bold');
              pdf.text(titles[i], 10, yPos);
              yPos += 10;

              // Задачи
              pdf.setFontSize(12);
              pdf.setFont(fontName, 'normal');
              tasks.forEach(task => {
                pdf.text(`• ${task.text}`, 15, yPos);
                yPos += 8;
              });
              yPos += 10;
            }
          }

          // Генерируем имя файла с датой
          const now = new Date();
          const dd = String(now.getDate()).padStart(2, '0');
          const mm = String(now.getMonth() + 1).padStart(2, '0');
          const yyyy = now.getFullYear();
          const fileName = `ToDo ЕГЭ ${dd}-${mm}-${yyyy}.pdf`;

          // Сохраняем
          pdf.save(fileName);
          document.getElementById('printModal').style.display = 'none';
        };
      });
    </script>
</body>
</html>
