<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

    <!-- Ссылка на манифест -->
    <link rel="manifest" href="./manifest.json">

    <!-- Настройки для iOS (iPhone), чтобы выглядело как приложение -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ЕГЭ 2026">
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/android-chrome-192x192.png">

    <!-- Цвет вкладки браузера под твой дизайн -->
    <meta name="theme-color" content="#1a0a0a">
    <script src="./theme.js"></script>

    <!-- Шрифт для PDF с кириллицей -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">

    <title>Цели на ЕГЭ</title>
    <style>
        :root {
            --page-bg: #1a0a0a;
            --surface: rgba(255, 255, 255, 0.05);
            --surface-strong: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.55);
            --accent-primary: #ff4d4d;
            --accent-secondary: #ff8080;
            --accent-tertiary: #e63946;
            --accent-text: #ff9a9a;
            --accent-text-alt: #ffb3b3;
            --accent-soft: rgba(255, 100, 100, 0.1);
            --accent-border: rgba(255, 100, 100, 0.25);
            --accent-border-strong: rgba(255, 100, 100, 0.5);
            --accent-shadow: rgba(255, 77, 77, 0.25);
            --accent-dot: #ff4d4d;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            -webkit-touch-callout: none;
            touch-action: manipulation;
        }

        html {
            min-height: 100%;
            background: var(--page-bg);
            color: var(--text-primary);
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            background: var(--page-bg);
            overflow-x: hidden;
            overflow-y: auto;
            -webkit-text-size-adjust: 100%;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }

        /* Animated background */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .bg span {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.5;
            animation: float 8s ease-in-out infinite;
        }

        .bg span:nth-child(1) {
            width: 500px; height: 500px;
            background: var(--accent-primary);
            top: -10%; left: -5%;
            animation-delay: 0s;
        }

        .bg span:nth-child(2) {
            width: 400px; height: 400px;
            background: var(--accent-secondary);
            bottom: -10%; right: -5%;
            animation-delay: -3s;
        }

        .bg span:nth-child(3) {
            width: 350px; height: 350px;
            background: var(--accent-tertiary);
            top: 40%; left: 50%;
            transform: translateX(-50%);
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-40px) scale(1.08); }
        }

        /* Login button - top right corner */
        .settings-btn {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 100;
            width: 50px;
            height: 50px;
            border-radius: 18px;
            border: 1px solid var(--accent-border);
            background: var(--surface);
            display: grid;
            place-items: center;
            color: var(--accent-text);
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .settings-btn:hover {
            background: var(--surface-strong);
            border-color: var(--accent-border-strong);
            box-shadow: 0 8px 32px var(--accent-shadow);
        }

        .settings-btn svg {
            width: 22px;
            height: 22px;
            stroke: currentColor;
        }

        .theme-panel {
            position: fixed;
            top: 90px;
            right: 30px;
            z-index: 110;
            width: 220px;
            padding: 18px;
            border-radius: 24px;
            background: var(--surface);
            border: 1px solid var(--accent-border);
            backdrop-filter: blur(24px);
            opacity: 0;
            transform: translateY(-12px);
            pointer-events: none;
            transition: all 0.2s ease;
        }

        .theme-panel.open {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .theme-panel .panel-title {
            margin-bottom: 14px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--accent-text);
        }

        .theme-options {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 10px;
        }

        .theme-swatch {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 14px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .page-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            gap: 0;
        }

        .theme-swatch:hover {
            transform: translateY(-2px);
            border-color: var(--accent-border);
        }

        .theme-swatch.active {
            border-color: var(--accent-text-alt);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.12);
        }

        /* Card */
        .card {
            position: relative;
            z-index: 1;
            width: min(92vw, 720px);
            max-width: 720px;
            background: var(--surface);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--accent-border);
            border-radius: 32px;
            padding: clamp(32px, 5vw, 56px) clamp(24px, 6vw, 60px) clamp(32px, 5vw, 56px);
            text-align: center;
            box-shadow:
                0 0 80px rgba(0, 0, 0, 0.14),
                inset 0 0 80px rgba(255, 255, 255, 0.03);
        }

        .title {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--accent-text);
            margin-bottom: 10px;
        }

        .heading {
            font-size: 38px;
            font-weight: 800;
            color: var(--text-primary);
            margin-bottom: 50px;
            background: linear-gradient(135deg, var(--text-primary), var(--accent-text-alt));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Circles container */
        .circles {
            display: flex;
            flex-wrap: wrap;
            gap: 32px;
            align-items: flex-end;
            justify-content: center;
        }

        .circle-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            min-width: 145px;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .circle-item:nth-child(1) { animation-delay: 0.2s; }
        .circle-item:nth-child(2) { animation-delay: 0.4s; }
        .circle-item:nth-child(3) { animation-delay: 0.6s; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* SVG Circle */
        .progress-ring {
            width: 160px;
            height: 160px;
            transform: rotate(-90deg);
        }

        .progress-ring__bg {
            fill: none;
            stroke: var(--surface-strong);
            stroke-width: 8;
        }

        .progress-ring__fill {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 408.4;
            stroke-dashoffset: 408.4;
            animation: fillRing 2s ease forwards;
        }

        .circle-item:nth-child(1) .progress-ring__fill {
            stroke: url(#grad1);
            animation-delay: 0.5s;
        }

        .circle-item:nth-child(2) .progress-ring__fill {
            stroke: url(#grad2);
            animation-delay: 0.7s;
        }

        .circle-item:nth-child(3) .progress-ring__fill {
            stroke: url(#grad3);
            animation-delay: 0.9s;
        }

        @keyframes fillRing {
            to {
                stroke-dashoffset: var(--offset);
            }
        }

        /* Score inside circle */
        .score-wrapper {
            position: relative;
            display: inline-block;
        }

        .score {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            font-weight: 800;
            color: var(--text-primary);
            line-height: 1;
        }

        .score small {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-muted);
        }

        /* Subject label */
        .subject {
            font-size: 15px;
            font-weight: 600;
            color: var(--accent-text);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* Glow dots */
        .glow-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-top: 8px;
            animation: pulse 2s ease-in-out infinite;
            background: var(--accent-dot);
            box-shadow: 0 0 12px var(--accent-shadow);
        }

        .circle-item:nth-child(1) .glow-dot { animation-delay: 0s; }
        .circle-item:nth-child(2) .glow-dot { animation-delay: 0.3s; }
        .circle-item:nth-child(3) .glow-dot { animation-delay: 0.6s; }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }

        /* Divider */
        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-border), transparent);
            margin: 30px auto 0;
            border-radius: 2px;
        }

        .subtitle {
            margin-top: 16px;
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: 2px;
        }

        /* Motivation Block */
        .motivation-block {
            position: relative;
            z-index: 1;
            width: min(92vw, 720px);
            max-width: 720px;
            margin: 38px auto 0;
            background: var(--surface);
            border: 1px solid var(--accent-border);
            border-radius: 32px;
            padding: clamp(28px, 4vw, 40px) clamp(20px, 5vw, 36px);
            text-align: center;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.08);
            animation: fadeUp 0.8s ease forwards;
            animation-delay: 0.3s;
            opacity: 1;
        }

        .motivation-block .title {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--accent-text);
            margin-bottom: 18px;
        }

        .motivation-content {
            min-height: auto;
            display: block;
            margin: 0 auto 24px;
            padding: 0 8px;
        }

        .motivation-text {
            display: inline-block;
            max-width: 100%;
            font-size: clamp(18px, 4vw, 22px);
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.5;
            letter-spacing: 0.1em;
            white-space: normal;
            word-break: break-word;
            opacity: 1;
            transition: opacity 0.2s ease;
            text-align: center;
        }

        .motivation-text.animate {
            animation: fadeIn 0.4s ease forwards;
        }

        .motivation-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 14px 32px;
            min-width: 250px;
            border-radius: 20px;
            border: 1px solid var(--accent-border);
            background: var(--surface);
            color: var(--accent-text);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .motivation-btn:hover {
            background: var(--surface-strong);
            border-color: var(--accent-border-strong);
            transform: translateY(-2px);
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.12);
        }

        .motivation-btn:active {
            transform: translateY(0);
        }

        .motivation-btn svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
        }

        .analytics-link {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 28px auto 0;
            width: min(100%, 320px);
            padding: 16px 28px;
            border-radius: 24px;
            border: 1px solid var(--accent-border);
            background: var(--surface);
            color: var(--accent-text);
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.25s ease;
            /* 👇 ДОБАВЛЕНО: чтобы ссылка была кликабельной поверх других элементов */
            position: relative;
            z-index: 50;
        }

        .analytics-link:hover {
            background: var(--surface-strong);
            border-color: var(--accent-border-strong);
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.12);
            transform: translateY(-1px);
        }

        .analytics-link + .analytics-link {
            margin-top: 16px;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.72);
            backdrop-filter: blur(12px);
            padding: 20px;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal-content {
            width: min(100%, 560px);
            max-width: 100%;
            background: var(--surface);
            border: 1px solid var(--accent-border);
            border-radius: 28px;
            padding: clamp(24px, 4vw, 32px);
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.28);
            text-align: center;
            color: var(--text-primary);
        }

        .modal-content h2 {
            margin-bottom: 12px;
            font-size: clamp(20px, 3vw, 24px);
            font-weight: 800;
        }

        .modal-content p {
            margin-bottom: 24px;
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
        }

        .modal-actions {
            display: grid;
            gap: 12px;
        }

        .modal-content .add-task-btn,
        .modal-content .analytics-link {
            width: 100%;
            padding: 16px 20px;
            border-radius: 20px;
            font-size: 15px;
        }

        .modal-content .analytics-link {
            background: transparent;
        }

        .modal-content .add-task-btn {
            border-style: solid;
            border-width: 1px;
        }

        .add-task-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px 24px;
            width: 100%;
            border-radius: 24px;
            border: 2px dashed var(--accent-border);
            background: transparent;
            color: var(--accent-text);
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .add-task-btn:hover {
            border-color: var(--accent-text-alt);
            color: var(--accent-text-alt);
            transform: translateY(-1px);
        }

        .add-task-btn svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            stroke-width: 2;
        }

        @media (max-width: 700px) {
            .settings-btn {
                top: 20px;
                right: 20px;
                width: 44px;
                height: 44px;
            }
            .settings-btn svg {
                width: 16px;
                height: 16px;
            }
            .card { padding: 40px 30px 50px; margin: 20px; }
            .circles { gap: 30px; }
            .progress-ring { width: 120px; height: 120px; }
            .score { font-size: 28px; }
            .heading { font-size: 28px; }
            .motivation-block {
                padding: 28px 20px;
                margin-top: 28px;
            }
            .motivation-content {
                margin-bottom: 20px;
            }
            .motivation-btn {
                width: 100%;
                min-width: auto;
                padding: 16px 24px;
            }
            .motivation-text {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

    <div class="bg">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <button class="settings-btn" id="settingsBtn" type="button" aria-label="Настройки темы">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" />
            <path d="M19.4 15a7.07 7.07 0 0 0 .1-1 7.07 7.07 0 0 0-.1-1l2.1-1.6a0.5 0.5 0 0 0 .1-0.7l-2-3.4a0.5 0.5 0 0 0-.6-0.2l-2.5 1a7.2 7.2 0 0 0-1.8-1l-0.4-2.7A0.5 0.5 0 0 0 14.7 4h-4a0.5 0.5 0 0 0-0.5 0.4l-0.4 2.7a7.2 7.2 0 0 0-1.8 1l-2.5-1a0.5 0.5 0 0 0-0.6 0.2l-2 3.4a0.5 0.5 0 0 0 .1 0.7l2.1 1.6a7.07 7.07 0 0 0-.1 1 7.07 7.07 0 0 0 .1 1L2.6 16.6a0.5 0.5 0 0 0-.1 0.7l2 3.4a0.5 0.5 0 0 0 .6 0.2l2.5-1a7.2 7.2 0 0 0 1.8 1l0.4 2.7a0.5 0.5 0 0 0 .5 0.4h4a0.5 0.5 0 0 0 .5-0.4l0.4-2.7a7.2 7.2 0 0 0 1.8-1l2.5 1a0.5 0.5 0 0 0 .6-0.2l2-3.4a0.5 0.5 0 0 0-.1-0.7l-2.1-1.6Z" />
        </svg>
    </button>

    <div class="theme-panel" id="themePanel">
        <div class="panel-title">Выбери цвет</div>
        <div class="theme-options">
            <button class="theme-swatch" data-theme="red" style="background: #ff4d4d" aria-label="Красный"></button>
            <button class="theme-swatch" data-theme="blue" style="background: #4d8cff" aria-label="Голубой"></button>
            <button class="theme-swatch" data-theme="green" style="background: #33c37d" aria-label="Зеленый"></button>
            <button class="theme-swatch" data-theme="yellow" style="background: #ffd34d" aria-label="Желтый"></button>
            <button class="theme-swatch" data-theme="pink" style="background: #ff4dbd" aria-label="Ярко розовый"></button>
            <button class="theme-swatch" data-theme="gray" style="background: #ababab" aria-label="Серый"></button>
        </div>
    </div>

    <div class="page-content">
        <div class="card">
            <div class="title">Цели на</div>
            <h1 class="heading">ЕГЭ 2026</h1>

        <div class="circles">

            <!-- Русский — 81 -->
            <a href="russian.html" class="circle-item" style="text-decoration: none; color: inherit;">
                <div class="score-wrapper">
                    <svg class="progress-ring" viewBox="0 0 140 140">
                        <defs>
                            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="var(--accent-primary)"/>
                                <stop offset="100%" stop-color="var(--accent-secondary)"/>
                            </linearGradient>
                        </defs>
                        <circle class="progress-ring__bg" cx="70" cy="70" r="65"/>
                        <circle class="progress-ring__fill" cx="70" cy="70" r="65"
                            style="--offset: 77.6;"/>
                    </svg>
                    <div class="score">81</div>
                </div>
                <div class="subject">Русский язык</div>
                <div class="glow-dot"></div>
            </a>

            <!-- Математика — 82 -->
            <a href="math.html" class="circle-item" style="text-decoration: none; color: inherit;">
                <div class="score-wrapper">
                    <svg class="progress-ring" viewBox="0 0 140 140">
                        <defs>
                            <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="var(--accent-primary)"/>
                                <stop offset="100%" stop-color="var(--accent-secondary)"/>
                            </linearGradient>
                        </defs>
                        <circle class="progress-ring__bg" cx="70" cy="70" r="65"/>
                        <circle class="progress-ring__fill" cx="70" cy="70" r="65"
                            style="--offset: 73.5;"/>
                    </svg>
                    <div class="score">82</div>
                </div>
                <div class="subject">Математика</div>
                <div class="glow-dot"></div>
            </a>

            <!-- Информатика — 93 -->
            <a href="informatics.html" class="circle-item" style="text-decoration: none; color: inherit;">
                <div class="score-wrapper">
                    <svg class="progress-ring" viewBox="0 0 140 140">
                        <defs>
                            <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="var(--accent-primary)"/>
                                <stop offset="100%" stop-color="var(--accent-secondary)"/>
                            </linearGradient>
                        </defs>
                        <circle class="progress-ring__bg" cx="70" cy="70" r="65"/>
                        <circle class="progress-ring__fill" cx="70" cy="70" r="65"
                            style="--offset: 28.6;"/>
                    </svg>
                    <div class="score">93</div>
                </div>
                <div class="subject">Информатика</div>
                <div class="glow-dot"></div>
            </a>

        </div>

        <div class="divider"></div>
        <div class="subtitle">Дорогу осилит идущий.</div>
    </div>

    <!-- Motivation Block -->
    <div class="motivation-block">
        <div class="title">Мотивация</div>
        <div class="motivation-content">
            <div class="motivation-text" id="motivationText">Как насчет мотивации?)</div>
        </div>
        <button class="motivation-btn" id="motivationBtn" type="button" aria-label="Получить мотивацию">
            <svg viewBox="0 0 24 24" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/>
            </svg>
            Получить
        </button>
    </div>
    <a href="./analytics.html" class="analytics-link">Аналитика</a>
    <button id="printBtn" class="analytics-link" type="button">Печать</button>
</div>

    <script>
      // Регистрация Service Worker для работы офлайн
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            const registration = await navigator.serviceWorker.register('./sw.js', {
              scope: './'
            });
            console.log('[App] Service Worker зарегистрирован:', registration.scope);

            // Проверка обновлений каждые 6 часов
            setInterval(() => {
              registration.update();
            }, 6 * 60 * 60 * 1000);

            // Слушаем новые обновления
            registration.addEventListener('updatefound', () => {
              const newWorker = registration.installing;
              newWorker.addEventListener('statechange', () => {
                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                  // Новое обновление доступно
                  console.log('[App] Доступно обновление приложения');
                  // Уведомляем пользователя (опционально)
                  if (confirm('Доступно обновление приложения. Установить?')) {
                    newWorker.postMessage({ type: 'SKIP_WAITING' });
                    window.location.reload();
                  }
                }
              });
            });
          } catch (error) {
            console.error('[App] Ошибка регистрации Service Worker:', error);
          }
        });

        // Обработка сообщений от Service Worker
        let refreshing = false;
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          if (refreshing) return;
          refreshing = true;
          console.log('[App] Service Worker обновлён');
        });
      }

      // Проверка статуса подключения
      window.addEventListener('online', () => {
        console.log('[App] Соединение восстановлено');
      });

      window.addEventListener('offline', () => {
        console.log('[App] Потеря соединения - переход в офлайн-режим');
      });
    </script>

    <script>
      // Регистрация Service Worker
      // Motivation block functionality
      let motivations = [];
      let currentMotivationIndex = -1;

      async function loadMotivations() {
        const paths = ['./словарь.txt', 'словарь.txt'];
        for (const path of paths) {
          try {
            const response = await fetch(path);
            if (!response.ok) continue;
            const text = await response.text();
            motivations = text.split('\n').map(line => line.trim()).filter(line => line.length > 0);
            if (motivations.length) return;
          } catch (_) {
            // попытка следующего пути
          }
        }

        motivations = [
          'Ты справишься! Верь в себя!',
          'Каждый день — это новая возможность.',
          'Не сдавайся, ты почти там!',
          'Успех ждёт тех, кто готов трудиться.'
        ];
      }

      function getRandomMotivation() {
        if (motivations.length === 0) return 'Как насчет мотивации?)';

        let randomIndex;
        do {
          randomIndex = Math.floor(Math.random() * motivations.length);
        } while (randomIndex === currentMotivationIndex && motivations.length > 1);

        currentMotivationIndex = randomIndex;
        return motivations[randomIndex];
      }

      function displayMotivation() {
        const motivationText = document.getElementById('motivationText');
        const newMotivation = getRandomMotivation();

        motivationText.classList.remove('animate');
        motivationText.style.opacity = '0';

        setTimeout(() => {
          motivationText.textContent = newMotivation;
          motivationText.style.opacity = '1';
          motivationText.classList.add('animate');
        }, 50);
      }

      document.addEventListener('DOMContentLoaded', async () => {
        await loadMotivations();
        const motivationBtn = document.getElementById('motivationBtn');
        if (motivationBtn) {
          motivationBtn.addEventListener('click', displayMotivation);
        }
      });
    </script>

    <!-- Модальное окно для печати -->
    <div id="printModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="printModalTitle">
        <div class="modal-content">
            <h2 id="printModalTitle">Печать</h2>
            <p>Сформировать PDF-отчёт с задачами. Файл создаётся на белом фоне с чёрным текстом.</p>
            <div class="modal-actions">
                <button id="downloadPdfBtn" class="add-task-btn" type="button">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="7 10 12 15 17 10"/>
                        <line x1="12" y1="15" x2="12" y2="3"/>
                    </svg>
                    Скачать PDF
                </button>
                <button id="closePrintModal" class="analytics-link" type="button">Отмена</button>
            </div>
        </div>
    </div>

    <script>
      // Функционал кнопки "Печать" и модального окна
      const printBtn = document.getElementById('printBtn');
      const printModal = document.getElementById('printModal');
      const closePrintModal = document.getElementById('closePrintModal');
      const downloadPdfBtn = document.getElementById('downloadPdfBtn');

      function openPrintModal() {
          printModal.classList.add('open');
      }

      function closePrintModalWindow() {
          printModal.classList.remove('open');
      }

      function arrayBufferToBase64(buffer) {
          let binary = '';
          const bytes = new Uint8Array(buffer);
          const chunkSize = 0x8000;
          for (let i = 0; i < bytes.length; i += chunkSize) {
              binary += String.fromCharCode(...bytes.subarray(i, i + chunkSize));
          }
          return btoa(binary);
      }

      function ensureJsPdfLoaded() {
          const existing = window.jspdf || window.jsPDF;
          if (existing) {
              return Promise.resolve(existing.jsPDF || existing.default || existing);
          }

          return new Promise((resolve, reject) => {
              const script = document.createElement('script');
              script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
              script.defer = true;
              script.onload = () => {
                  const loaded = window.jspdf || window.jsPDF;
                  const constructor = loaded && (loaded.jsPDF || loaded.default || loaded);
                  if (constructor) {
                      resolve(constructor);
                  } else {
                      reject(new Error('jsPDF не загрузился'));
                  }
              };
              script.onerror = () => reject(new Error('Ошибка загрузки jsPDF'));
              document.head.appendChild(script);
          });
      }

      async function buildPdf() {
          const JsPDF = await ensureJsPdfLoaded();
          const pdf = new JsPDF({ orientation: 'p', unit: 'mm', format: 'a4' });
          pdf.setTextColor(0, 0, 0);

          const fontUrl = 'https://cdn.jsdelivr.net/npm/noto-sans@12.0.0/files/NotoSans-Regular.ttf';
          let pdfFont = 'Helvetica';
          try {
              const fontBuffer = await fetch(fontUrl).then(res => {
                  if (!res.ok) throw new Error('Не удалось загрузить шрифт');
                  return res.arrayBuffer();
              });
              const fontBase64 = arrayBufferToBase64(fontBuffer);
              pdf.addFileToVFS('NotoSans-Regular.ttf', fontBase64);
              pdf.addFont('NotoSans-Regular.ttf', 'NotoSans', 'normal');
              pdfFont = 'NotoSans';
          } catch (fontError) {
              console.warn('Шрифт Noto Sans не загружен, используется Helvetica:', fontError);
          }

          pdf.setFont(pdfFont, 'normal');
          pdf.setFontSize(22);
          pdf.text('ToDo ЕГЭ', pdf.internal.pageSize.getWidth() / 2, 20, { align: 'center' });
          let yPos = 35;
          const maxWidth = pdf.internal.pageSize.getWidth() - 20;
          const marginLeft = 10;
          const lineHeight = 8;

          const subjects = ['math', 'russian', 'informatics'];
          const titles = ['Математика', 'Русский язык', 'Информатика'];

          const addPageIfNeeded = (y) => {
              if (y > pdf.internal.pageSize.getHeight() - 20) {
                  pdf.addPage();
                  return 20;
              }
              return y;
          };

          for (let i = 0; i < subjects.length; i++) {
              const key = `${subjects[i]}_tasks`;
              const tasks = JSON.parse(localStorage.getItem(key) || '[]');
              if (!tasks.length) continue;

              yPos = addPageIfNeeded(yPos);
              pdf.setFontSize(16);
              pdf.setFont(pdfFont, 'normal');
              pdf.text(titles[i], marginLeft, yPos);
              yPos += lineHeight;

              pdf.setFontSize(12);
              for (const task of tasks) {
                  yPos = addPageIfNeeded(yPos);
                  const taskText = `• ${task.text || task}`;
                  const lines = pdf.splitTextToSize(taskText, maxWidth - marginLeft);
                  pdf.text(lines, marginLeft + 5, yPos);
                  yPos += lines.length * lineHeight;
              }
              yPos += lineHeight;
          }

          return pdf;
      }

      printBtn?.addEventListener('click', openPrintModal);
      closePrintModal?.addEventListener('click', closePrintModalWindow);
      downloadPdfBtn?.addEventListener('click', async () => {
          try {
              const pdf = await buildPdf();
              const now = new Date();
              const dd = String(now.getDate()).padStart(2, '0');
              const mm = String(now.getMonth() + 1).padStart(2, '0');
              const yyyy = now.getFullYear();
              const fileName = `ToDo ЕГЭ ${dd}-${mm}-${yyyy}.pdf`;
              pdf.save(fileName);
              closePrintModalWindow();
          } catch (error) {
              console.error(error);
              alert('Не удалось сформировать PDF. Попробуйте позже.');
          }
      });
    </script>
</body>
