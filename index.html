<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цели на ЕГЭ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            background: #1a0a0a;
            overflow: hidden;
        }

        /* Animated background */
        .bg {
            position: fixed;
            inset: 0;
            z-index: 0;
        }

        .bg span {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.5;
            animation: float 8s ease-in-out infinite;
        }

        .bg span:nth-child(1) {
            width: 500px; height: 500px;
            background: #ff4d4d;
            top: -10%; left: -5%;
            animation-delay: 0s;
        }

        .bg span:nth-child(2) {
            width: 400px; height: 400px;
            background: #ff8080;
            bottom: -10%; right: -5%;
            animation-delay: -3s;
        }

        .bg span:nth-child(3) {
            width: 350px; height: 350px;
            background: #e63946;
            top: 40%; left: 50%;
            transform: translateX(-50%);
            animation-delay: -5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-40px) scale(1.08); }
        }

        /* Login button - top right corner */
        .login-btn {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 12px 24px;
            border-radius: 16px;
            border: 1px solid rgba(255, 100, 100, 0.25);
            background: rgba(255, 100, 100, 0.1);
            backdrop-filter: blur(10px);
            color: #ff9a9a;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .login-btn:hover {
            background: rgba(255, 100, 100, 0.2);
            border-color: rgba(255, 100, 100, 0.5);
            color: #ffb3b3;
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(255, 77, 77, 0.25);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn svg {
            width: 18px;
            height: 18px;
            stroke: currentColor;
        }

        /* Card */
        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 100, 100, 0.15);
            border-radius: 32px;
            padding: 50px 60px 60px;
            text-align: center;
            box-shadow:
                0 0 80px rgba(255, 77, 77, 0.1),
                inset 0 0 80px rgba(255, 100, 100, 0.03);
        }

        .title {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #ff9a9a;
            margin-bottom: 10px;
        }

        .heading {
            font-size: 38px;
            font-weight: 800;
            color: #fff;
            margin-bottom: 50px;
            background: linear-gradient(135deg, #ffffff, #ffb3b3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Circles container */
        .circles {
            display: flex;
            gap: 60px;
            align-items: flex-end;
            justify-content: center;
        }

        .circle-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            opacity: 0;
            animation: fadeUp 0.8s ease forwards;
        }

        .circle-item:nth-child(1) { animation-delay: 0.2s; }
        .circle-item:nth-child(2) { animation-delay: 0.4s; }
        .circle-item:nth-child(3) { animation-delay: 0.6s; }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* SVG Circle */
        .progress-ring {
            width: 160px;
            height: 160px;
            transform: rotate(-90deg);
        }

        .progress-ring__bg {
            fill: none;
            stroke: rgba(255, 255, 255, 0.07);
            stroke-width: 8;
        }

        .progress-ring__fill {
            fill: none;
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 408.4;
            stroke-dashoffset: 408.4;
            animation: fillRing 2s ease forwards;
        }

        .circle-item:nth-child(1) .progress-ring__fill {
            stroke: url(#grad1);
            animation-delay: 0.5s;
        }

        .circle-item:nth-child(2) .progress-ring__fill {
            stroke: url(#grad2);
            animation-delay: 0.7s;
        }

        .circle-item:nth-child(3) .progress-ring__fill {
            stroke: url(#grad3);
            animation-delay: 0.9s;
        }

        @keyframes fillRing {
            to {
                stroke-dashoffset: var(--offset);
            }
        }

        /* Score inside circle */
        .score-wrapper {
            position: relative;
            display: inline-block;
        }

        .score {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            font-weight: 800;
            color: #fff;
            line-height: 1;
        }

        .score small {
            font-size: 16px;
            font-weight: 600;
            color: rgba(255, 180, 180, 0.6);
        }

        /* Subject label */
        .subject {
            font-size: 15px;
            font-weight: 600;
            color: #ffaaaa;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* Glow dots */
        .glow-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-top: 8px;
            animation: pulse 2s ease-in-out infinite;
        }

        .circle-item:nth-child(1) .glow-dot { background: #ff4d4d; box-shadow: 0 0 12px #ff4d4d; animation-delay: 0s; }
        .circle-item:nth-child(2) .glow-dot { background: #ff8080; box-shadow: 0 0 12px #ff8080; animation-delay: 0.3s; }
        .circle-item:nth-child(3) .glow-dot { background: #e63946; box-shadow: 0 0 12px #e63946; animation-delay: 0.6s; }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }

        /* Divider */
        .divider {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 100, 100, 0.3), transparent);
            margin: 30px auto 0;
            border-radius: 2px;
        }

        .subtitle {
            margin-top: 16px;
            font-size: 13px;
            color: rgba(255, 150, 150, 0.35);
            letter-spacing: 2px;
        }

        @media (max-width: 700px) {
            .login-btn {
                top: 20px;
                right: 20px;
                padding: 10px 18px;
                font-size: 13px;
            }
            .login-btn svg {
                width: 16px;
                height: 16px;
            }
            .card { padding: 40px 30px 50px; margin: 20px; }
            .circles { gap: 30px; }
            .progress-ring { width: 120px; height: 120px; }
            .score { font-size: 28px; }
            .heading { font-size: 28px; }
        }
    </style>
</head>
<body>

    <div class="bg">
        <span></span>
        <span></span>
        <span></span>
    </div>

    <!-- Login button - top right -->
    <a href="avtoriz.testovoerazreshenie" class="login-btn" id="loginBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"></path>
            <polyline points="10 17 15 12 10 7"></polyline>
            <line x1="15" y1="12" x2="3" y2="12"></line>
        </svg>
        Войти
    </a>

    <div class="card">
        <div class="title">Цели на</div>
        <h1 class="heading">ЕГЭ 2026</h1>

        <div class="circles">

            <!-- Русский — 81 -->
            <a href="russian.html" class="circle-item" style="text-decoration: none; color: inherit;">
                <div class="score-wrapper">
                    <svg class="progress-ring" viewBox="0 0 140 140">
                        <defs>
                            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#ff6b6b"/>
                                <stop offset="100%" stop-color="#ff4d4d"/>
                            </linearGradient>
                        </defs>
                        <circle class="progress-ring__bg" cx="70" cy="70" r="65"/>
                        <circle class="progress-ring__fill" cx="70" cy="70" r="65"
                            style="--offset: 77.6;"/>
                    </svg>
                    <div class="score">81</div>
                </div>
                <div class="subject">Русский язык</div>
                <div class="glow-dot"></div>
            </a>

            <!-- Математика — 82 -->
            <a href="math.html" class="circle-item" style="text-decoration: none; color: inherit;">
                <div class="score-wrapper">
                    <svg class="progress-ring" viewBox="0 0 140 140">
                        <defs>
                            <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#ff8080"/>
                                <stop offset="100%" stop-color="#e63946"/>
                            </linearGradient>
                        </defs>
                        <circle class="progress-ring__bg" cx="70" cy="70" r="65"/>
                        <circle class="progress-ring__fill" cx="70" cy="70" r="65"
                            style="--offset: 73.5;"/>
                    </svg>
                    <div class="score">82</div>
                </div>
                <div class="subject">Математика</div>
                <div class="glow-dot"></div>
            </a>

            <!-- Информатика — 93 -->
            <a href="informatics.html" class="circle-item" style="text-decoration: none; color: inherit;">
                <div class="score-wrapper">
                    <svg class="progress-ring" viewBox="0 0 140 140">
                        <defs>
                            <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
                                <stop offset="0%" stop-color="#e63946"/>
                                <stop offset="100%" stop-color="#c0392b"/>
                            </linearGradient>
                        </defs>
                        <circle class="progress-ring__bg" cx="70" cy="70" r="65"/>
                        <circle class="progress-ring__fill" cx="70" cy="70" r="65"
                            style="--offset: 28.6;"/>
                    </svg>
                    <div class="score">93</div>
                </div>
                <div class="subject">Информатика</div>
                <div class="glow-dot"></div>
            </a>

        </div>

        <div class="divider"></div>
        <div class="subtitle">Дорогу осилит идущий.</div>
    </div>

    <!-- Подключение функционала авторизации -->
    <script src="avtoriz.testovoerazreshenie"></script>

</body>
</html>
